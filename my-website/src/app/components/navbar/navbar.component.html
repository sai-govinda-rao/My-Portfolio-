<nav class="nav">
  <!-- Brand -->
  <div class="brand">{{ brandName }}</div>
  <div class="nav-right">
    <!-- Desktop Links -->
    <ul class="nav-links desktop">
      <li *ngFor="let item of sections">
        <a
          (click)="scrollTo(item.id)"
          [class.active]="activeSection === item.id"
        >
          {{ item.label }}
        </a>
      </li>
    </ul>

    <!-- Profile Image (DESKTOP + MOBILE trigger) -->
    <div class="profile-photo" (click)="toggleMenu()">
      <img src="profile.jpg" alt="Profile Photo" />
    </div>
  </div>
</nav>

<!-- BACKDROP -->
<div
  class="menu-backdrop"
  *ngIf="menuOpen"
  (click)="toggleMenu()"
></div>
<!-- MOBILE SLIDE MENU -->
<div class="mobile-menu" [class.open]="menuOpen">
  <div class="menu-header">
    <span class="menu-name">{{ brandName }}</span>
    <span class="close-btn" (click)="toggleMenu()">✕</span>
  </div>

  <ul class="mobile-links">
    <li *ngFor="let item of sections">
      <a
        (click)="scrollTo(item.id); toggleMenu()"
        [class.active]="activeSection === item.id"
      >
        {{ item.label }}
      </a>
    </li>
  </ul>
</div>
