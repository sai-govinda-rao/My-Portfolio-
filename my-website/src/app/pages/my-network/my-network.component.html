<section class="network-section">

  <h2 class="page-title">{{ title }}</h2>
  <p class="page-subtitle">{{ description }}</p>

  <div class="network-grid">
    <a
      *ngFor="let s of socials"
      class="social-card"
      [href]="s.url"
      target="_blank"
      rel="noopener"
    >
      <div class="icon-wrapper">
        <img [src]="s.icon" [alt]="s.name" />
      </div>
      <h3>{{ s.name }}</h3>
    </a>
  </div>

</section>
