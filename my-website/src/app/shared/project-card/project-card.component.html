<article class="project-card">
  <!-- Image Area -->
  <div class="image-area" [ngStyle]="{ 'background': project.imageGradient }">
    <div class="image-overlay"></div>
    <img
      class="project-icon"
      [src]="project.icon"
      [alt]="project.title + ' icon'"
    />
  </div>

  <!-- Content -->
  <div class="content">
    <h2 class="title">{{ project.title }}</h2>
    <p class="description">{{ project.shortDescription }}</p>

    <a
      class="view-btn"
      [routerLink]="['/projects', project.slug]"
      [ngStyle]="{ 'background': project.buttonColor }"
    >
      <span>View Project</span>
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</article>
