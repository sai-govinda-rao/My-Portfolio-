<article class="project-card">
  <!-- Gradient Header -->
  <div 
    class="image-area" 
    [ngStyle]="{ 'background': project.imageGradient }">
    <img
      class="project-icon"
      [src]="project.icon"
      [alt]="project.title + ' icon'"
    />
  </div>

  <!-- Content -->
  <div class="content">
    <h2 class="title">{{ project.title }}</h2>

    <p class="description">
      {{ project.shortDescription }}
    </p>

    <!-- Action -->
    <a
      class="view-btn"
      [routerLink]="['/projects', project.slug]"
      [ngStyle]="{ 'background': project.buttonColor }"
    >
      View Project →
    </a>
  </div>
</article>
